name = "chat-server-cf"
main = "src/worker.js"
compatibility_date = "2026-07-24"

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "chat_db"
database_id = "7874b9e4-930b-4f53-9cae-d46c0b97f49e"

# 新增：Durable Objects 绑定
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]
